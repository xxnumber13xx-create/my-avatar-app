<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EAF6FF">
<title>📖 かんじ バッジ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/styles.css">
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex; flex-direction: column;
    background:
      radial-gradient(circle at 10% 10%, #FFE4EC, transparent 40%),
      radial-gradient(circle at 90% 0%, #E4DAF5, transparent 35%),
      var(--bg);
  }
  .draw-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: #fff;
    border-bottom: 2px solid #EDE9FF; flex: 0 0 auto;
  }
  .draw-header h1 {
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    margin: 0; font-size: 18px; color: var(--purple); flex: 1; line-height: 1.1;
  }
  .back-btn {
    background: #F4F1FF; border: 2px solid #DCD5FF; color: var(--purple);
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    border-radius: 12px; padding: 8px 12px; cursor: pointer; font-size: 14px;
  }
  .main-scroll {
    flex: 1; overflow-y: auto;
    padding: 20px 14px calc(24px + var(--sab));
    display: flex; flex-direction: column; gap: 14px;
    max-width: 540px; width: 100%; margin: 0 auto; box-sizing: border-box;
  }

  /* ==== 学年ピッカー ==== */
  .grade-card {
    background: #fff; border: 3px solid #FFB6D0;
    border-radius: 20px; padding: 18px;
    box-shadow: 0 6px 0 rgba(225,78,127,0.20);
  }
  .grade-card h2 {
    margin: 0 0 8px; text-align: center;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 20px; color: var(--ink);
  }
  .grade-card .sub {
    text-align: center; margin: 0 0 14px;
    font-size: 12px; font-weight: 700; color: var(--ink-soft); line-height: 1.5;
  }
  .grade-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .grade-btn {
    background: linear-gradient(180deg, #FFDCEA, #FFB6D0);
    border: 3px solid #E14E7F; border-radius: 14px;
    padding: 14px 6px; cursor: pointer;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    color: #C63A6A; font-size: 13px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    box-shadow: 0 4px 0 #E14E7F;
    transition: transform .08s, box-shadow .08s;
  }
  .grade-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #E14E7F; }
  .grade-btn .icon { font-size: 22px; }
  .grade-btn .label { font-size: 11px; opacity: 0.8; font-weight: 700; }

  /* ==== 問題カード ==== */
  .kanji-card {
    background: #fff; border-radius: 24px;
    border: 3px solid #E14E7F;
    padding: 22px 18px 18px;
    box-shadow: 0 6px 0 rgba(225,78,127,0.28);
    text-align: center;
  }
  .kanji-progress {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 12px; color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .kanji-progress .grade-tag {
    background: linear-gradient(180deg, #FFDCEA, #FFB6D0);
    border: 2px solid #E14E7F; color: #C63A6A;
    padding: 3px 10px; border-radius: 999px; font-size: 11px;
  }
  .kanji-progress .count { color: var(--purple); }

  .kanji-display {
    font-family: 'Noto Serif JP', serif; font-weight: 900;
    font-size: clamp(96px, 30vw, 160px);
    color: #2E2A47;
    line-height: 1.1;
    text-shadow: 6px 6px 0 rgba(225,78,127,0.14);
    margin: 20px 0 4px;
    letter-spacing: 0;
    user-select: none;
  }
  .kanji-hint {
    font-size: 18px; color: var(--ink-soft);
    font-weight: 700; margin: 0 0 12px;
  }
  .kanji-prompt {
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 14px; color: var(--purple);
    margin-bottom: 14px;
  }
  .kanji-choices {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .kanji-choice {
    padding: 14px 8px;
    background: #FAF8FF;
    border: 3px solid #DCD5FF;
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 20px; color: var(--ink);
    cursor: pointer;
    transition: transform .08s, box-shadow .08s, background .15s;
    box-shadow: 0 4px 0 #DCD5FF;
    min-height: 60px;
  }
  .kanji-choice:active { transform: translateY(2px); box-shadow: 0 2px 0 #DCD5FF; }
  .kanji-choice:disabled { cursor: not-allowed; }
  .kanji-choice.correct {
    background: linear-gradient(180deg, #E8FFF3, #C7F3D6);
    border-color: #4CD4B0; color: #1F5A40;
    box-shadow: 0 4px 0 #4CD4B0;
    animation: correctPulse 0.5s ease;
  }
  .kanji-choice.wrong {
    background: linear-gradient(180deg, #FFE0E5, #FFB0BE);
    border-color: #E14E7F; color: #C63A6A;
    box-shadow: 0 4px 0 #E14E7F;
    animation: wrongShake 0.4s ease;
  }
  .kanji-choice.dim {
    opacity: 0.45;
  }
  @keyframes correctPulse {
    0%, 100% { transform: scale(1); }
    45% { transform: scale(1.08); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .kanji-feedback {
    margin: 14px 0 4px;
    padding: 12px 16px;
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 14px;
    display: none;
  }
  .kanji-feedback.show { display: block; animation: fbPop .35s ease; }
  @keyframes fbPop {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .kanji-feedback.correct {
    background: linear-gradient(180deg, #E8FFF3, #C7F3D6);
    border: 2px solid #4CD4B0; color: #1F5A40;
  }
  .kanji-feedback.wrong {
    background: linear-gradient(180deg, #FFE8EC, #FFB8C7);
    border: 2px solid #E14E7F; color: #C63A6A;
  }
  .kanji-feedback .earned {
    display: inline-block; margin-left: 8px;
    background: linear-gradient(180deg, #FFF3C9, #FFD966);
    color: #7A5200; border: 2px solid #E8A200;
    padding: 2px 10px; border-radius: 999px; font-size: 12px;

  .kanji-nav {

  .kanji-nav button {
    flex: 1; padding: 12px;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    border-radius: 12px; cursor: pointer;
    font-size: 14px;

  .kanji-nav .btn-next {

    border: 3px solid #7C6FF2; color: #5D51CC;
    box-shadow: 0 4px 0 #7C6FF2;
  }
  .kanji-nav .btn-next:active { transform: translateY(2px); box-shadow: 0 2px 0 #7C6FF2; }
  .kanji-nav .btn-back {

    background: #fff; border: 3px solid #FFD966;

    background: #FFF8E5; border: 2px solid #FFD966;
    color: #7A5200; padding: 10px 14px; border-radius: 12px;
    font-size: 12px; font-weight: 700; text-align: center;

// ============================================================
// 1日ボーナス上限管理 (quiz とは別のキー)
// ============================================================
const DAILY_KANJI_GOLD_CAP = 20;
const CORRECT_REWARD = 2;

function ymd() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getDailyEarned() {
  try { return Number(localStorage.getItem('avatarApp_kanjiGold_' + ymd()) || 0); } catch (e) { return 0; }
}
function addDailyEarned(n) {
  try {
    const cur = getDailyEarned();
    localStorage.setItem('avatarApp_kanjiGold_' + ymd(), String(cur + n));
    return cur + n;
  } catch (e) { return 0; }
}
function refreshCapNote() {
  const earned = getDailyEarned();
  const left = Math.max(0, DAILY_KANJI_GOLD_CAP - earned);
  const note = document.getElementById('capNote');
  if (left <= 0) {
    note.innerHTML = `🌟 きょうは もう ${DAILY_KANJI_GOLD_CAP}G ぜんぶ もらったよ！ れんしゅう だけ でも OK ♪`;
  } else {
    note.innerHTML = `きょう もらえる のこり: <b>${left}G</b> / ${DAILY_KANJI_GOLD_CAP}G`;
  }
}
refreshCapNote();

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/** 学年から10問セットを生成。各問題は正解1 + ダミー3の選択肢を持つ */
function generateSession(grade) {
  const pool = KANJI_DATA[grade];
  const picked = shuffle([...pool]).slice(0, 10);
  const readingsPool = pool.map(x => x.r);
  return picked.map(item => {
    // ダミー3つ (自分の読み以外からランダムに)
    const candidates = readingsPool.filter(r => r !== item.r);
    const distractors = shuffle(candidates).slice(0, 3);
    const choices = shuffle([item.r, ...distractors]);
    return { ...item, choices };
  });
}

document.querySelectorAll('.grade-btn').forEach(b => {
  b.addEventListener('click', () => startSession(Number(b.dataset.grade)));
});

function startSession(grade) {
  session.grade = grade;
  session.problems = generateSession(grade);
  session.index = 0;
  session.correct = 0;
  session.goldEarned = 0;
  session.currentAnswered = false;
  document.getElementById('gradePickerArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('quizArea').style.display = '';
  renderProblem();
}

function gradeLabel(g) {
  return g === 99 ? 'むずかしい' : `${g}ねん`;
}

function renderProblem() {
  const q = session.problems[session.index];
  const wrap = document.getElementById('quizArea');
  wrap.innerHTML = `
    <div class="kanji-card">
      <div class="kanji-progress">
        <span class="grade-tag">🎓 ${gradeLabel(session.grade)}</span>
        <span class="count">${session.index + 1} / ${session.problems.length}</span>
      </div>
      <div class="kanji-display">${q.k}</div>
      <div class="kanji-hint">${q.hint || ''}</div>
      <div class="kanji-prompt">なんて よむ？</div>
      <div class="kanji-choices" id="choicesRow"></div>
      <div class="kanji-feedback" id="feedback"></div>
      <div class="kanji-nav" id="navRow" style="display:none">
        <button class="btn-back" id="btnQuit">🏠 やめる</button>
        <button class="btn-next" id="btnNext">➡️ つぎ</button>
      </div>
    </div>
  `;
  session.currentAnswered = false;
  const choicesRow = document.getElementById('choicesRow');
  q.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'kanji-choice';
    btn.textContent = choice;
    btn.addEventListener('click', () => handleAnswer(choice, btn));
    choicesRow.appendChild(btn);
  });
}

async function handleAnswer(choice, btn) {
  if (session.currentAnswered) return;
  session.currentAnswered = true;
  const q = session.problems[session.index];
  const correct = choice === q.r;
  const fb = document.getElementById('feedback');
  const nav = document.getElementById('navRow');
  const allBtns = document.querySelectorAll('.kanji-choice');

  if (correct) {
    btn.classList.add('correct');
    allBtns.forEach(b => { if (b !== btn) b.classList.add('dim'); b.disabled = true; });
    session.correct += 1;
    const earned = getDailyEarned();
    const canEarn = earned < DAILY_KANJI_GOLD_CAP;
    const willEarn = canEarn ? CORRECT_REWARD : 0;
    if (willEarn > 0) {
      const childKey = api.getChildKey();
      if (childKey) {
        try {
          await earnGold(childKey, willEarn, `${gradeLabel(session.grade)} かんじ せいかい`);
          showGoldFly(willEarn);
          addDailyEarned(willEarn);
          session.goldEarned += willEarn;
        } catch (e) { console.warn(e); }
      }
    }
    fb.className = 'kanji-feedback correct show';
    fb.innerHTML = `🎉 せいかい！ ${willEarn > 0 ? `<span class="earned">+${willEarn}G</span>` : '<span class="earned" style="background:#EFECFA;color:#5D51CC;border-color:#DCD5FF;">きょうは じょうげん</span>'}`;
  } else {
    btn.classList.add('wrong');
    // 正解の選択肢をハイライト
    allBtns.forEach(b => {
      if (b.textContent === q.r) b.classList.add('correct');
      else if (b !== btn) b.classList.add('dim');
      b.disabled = true;
    });
    fb.className = 'kanji-feedback wrong show';
    fb.innerHTML = `😢 ざんねん... こたえは <b>${q.r}</b> だよ`;
  }
  nav.style.display = '';
  document.getElementById('btnNext').addEventListener('click', () => {
    session.index += 1;
    if (session.index >= session.problems.length) showResult();
    else renderProblem();
  });
  document.getElementById('btnQuit').addEventListener('click', showResult);
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const wrap = document.getElementById('resultArea');
  wrap.style.display = '';
  const total = session.index + (session.currentAnswered ? 1 : 0);
  const rate = total > 0 ? Math.round((session.correct / total) * 100) : 0;
  const encouragement = rate >= 80 ? '🌟 すごい！ かんじ の たつじん！' : rate >= 50 ? '👍 いいね！ その ちょうし！' : '💪 もう1かい やってみよう！';
  wrap.innerHTML = `
    <div class="result-card">
      <h2>${encouragement}</h2>
      <div class="result-score">${session.correct} / ${total}</div>
      <div>${rate}% せいかい</div>
      ${session.goldEarned > 0 ? `<div class="result-earned">💰 +${session.goldEarned}G ゲット！</div>` : ''}
      <div class="result-actions">
        <button class="btn-again" id="btnAgain">🔁 もう1かい</button>
        <button class="btn-home" id="btnHome">🏠 メニュー</button>
      </div>
    </div>
  `;
  document.getElementById('btnAgain').addEventListener('click', () => {
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('gradePickerArea').style.display = '';
    refreshCapNote();
  });
  document.getElementById('btnHome').addEventListener('click', () => { window.location.href = '/'; });
}
</script>
