<!DOCTYPE html>
<html lang="ja" class="app-fullscreen">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>おでかけ｜あばたーめーかー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/styles.css">
<style>
  /* 高さ・スクロール制御は shared/styles.css の .app-fullscreen クラス */
  body.app-fullscreen {
    background:
      radial-gradient(circle at 20% 0%, #FFE9C7, transparent 30%),
      radial-gradient(circle at 90% 100%, #DDEEFF, transparent 40%),
      var(--bg);
  }
  .draw-header {
    flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
    border-bottom: 2px solid #EDE9FF;
    position: relative; z-index: 200;
  }
  .draw-header .back-link { padding: 6px 12px; font-size: 13px; }
  .draw-header h1 {
    flex: 1; margin: 0;
    font-family: 'Baloo 2', sans-serif;
    color: #4CD4B0;
    font-size: clamp(16px, 3.5vw, 22px); letter-spacing: 0.3px;
  }

  .draw-main {
    flex: 1;
    display: grid;
    grid-template-columns: 240px 1fr 220px;
    min-height: 0; min-width: 0;
    position: relative;
  }
  .side-panel {
    background: rgba(255,255,255,0.95);
    border-right: 2px solid #EDE9FF;
    padding: 12px 12px calc(24px + env(safe-area-inset-bottom, 0));
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 0;
  }
  .side-panel.right {
    border-right: 0;
    border-left: 2px solid #EDE9FF;
  }
  .picker-title {
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 13px;
    color: var(--ink-soft); letter-spacing: 0.4px; padding: 4px 0;
  }
  .scene-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .scene-thumb {
    aspect-ratio: 3/2;
    background: var(--paper);
    border-radius: 12px;
    border: 3px solid transparent;
    padding: 4px;
    cursor: pointer;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: transform .1s;
  }
  .scene-thumb:active { transform: translateY(1px); }
  .scene-thumb.selected {
    border-color: #4CD4B0;
    background: #E8FBF4;
    box-shadow: 0 4px 0 rgba(76,212,176,0.35);
  }
  .scene-thumb .scene-svg-wrap {
    width: 100%; height: 55px; overflow: hidden;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .scene-thumb .scene-svg-wrap svg { width: 100%; height: 100%; }
  .scene-thumb .scene-label {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 11px; color: var(--ink);
  }
  .avatar-list {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
  }
  .avatar-thumb {
    aspect-ratio: 1; background: var(--paper);
    border-radius: 12px; border: 3px solid transparent;
    padding: 4px; cursor: pointer; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s;
  }
  .avatar-thumb:active { transform: translateY(1px); }
  .avatar-thumb.selected {
    border-color: var(--pink); background: #FFF0F7;
    box-shadow: 0 4px 0 rgba(255,107,157,0.35);
  }
  .avatar-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .empty-hint {
    padding: 16px 10px; text-align: center;
    color: var(--ink-soft); font-size: 11px; font-weight: 700;
    background: #F4F1FF; border-radius: 10px;
    border: 2px dashed #DCD5FF;
  }

  .canvas-area {
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #E8F2FF; padding: 12px;
    min-width: 0; min-height: 0;
  }
  .canvas-container {
    position: relative;
    max-width: 100%; max-height: 100%;
    aspect-ratio: 720 / 500;
    box-shadow: 0 10px 30px rgba(46,42,71,0.2);
    border-radius: 14px; overflow: hidden;
    background: #DDEEFF;
    touch-action: none;
  }
  #sceneCanvas {
    display: block;
    width: 100%; height: 100%;
    touch-action: none;
  }

  /* 下部ドック */
  .draw-dock {
    flex: 0 0 auto;
    background: #fff; border-top: 2px solid #EDE9FF;
    padding: 8px 14px calc(8px + env(safe-area-inset-bottom, 0));
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; z-index: 5;
  }
  .dock-slider {
    display: flex; align-items: center; gap: 6px; min-width: 160px;
  }
  .dock-slider label {
    font-family: 'Baloo 2', sans-serif;
    font-size: 11px; color: var(--ink-soft); font-weight: 800;
  }
  .dock-slider input[type=range] { flex: 1; accent-color: #4CD4B0; min-width: 80px; }
  .dock-slider .value {
    font-family: 'Baloo 2', sans-serif; font-weight: 700;
    font-size: 12px; color: var(--ink);
    min-width: 30px; text-align: right;
  }
  .dock-btn {
    width: 40px; height: 40px; border-radius: 12px;
    border: 2px solid #EDE9FF; background: #F8F5FF;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .dock-btn:active { transform: translateY(1px); }
  .dock-spacer { flex: 1; }

  /* パネル開閉（モバイル） */
  .panel-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(46,42,71,0.35); z-index: 90;
  }
  .panel-backdrop.show { display: block; }
  .panel-close {
    display: none; position: absolute; top: 8px; right: 8px;
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid #EDE9FF; background: #fff;
    cursor: pointer; font-size: 15px;
    align-items: center; justify-content: center; padding: 0;
    z-index: 110; box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  }
  .panel-toggle {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(180deg, #C6F5E4, #A2E9C9);
    border: 2px solid #4CD4B0;
    cursor: pointer; font-size: 18px;
    align-items: center; justify-content: center; padding: 0;
    display: none;
  }
  .panel-toggle.active { background: #4CD4B0; color: #fff; }

  @media (max-width: 900px) {
    .draw-main { grid-template-columns: 1fr; }
    .side-panel {
      position: fixed; left: 0; top: 60px; bottom: 0;
      width: min(260px, 88vw);
      transform: translateX(-100%); transition: transform .25s;
      z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.15);
    }
    .side-panel.right {
      left: auto; right: 0;
      transform: translateX(100%);
      box-shadow: -10px 0 30px rgba(0,0,0,0.15);
    }
    .side-panel.open { transform: translateX(0); }
    .panel-toggle { display: flex; }
    .panel-close { display: flex; }
    .draw-dock { padding: 6px 8px calc(6px + env(safe-area-inset-bottom, 0)); gap: 6px; }
    .dock-slider { min-width: 120px; }
    .dock-btn { width: 36px; height: 36px; font-size: 15px; }
  }

  /* 保存モーダル */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(46,42,71,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal-card {
    background: #fff; border-radius: 24px;
    padding: 24px; max-width: 420px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-card h3 {
    font-family: 'Baloo 2', sans-serif; color: #4CD4B0;
    margin: 0 0 12px; font-size: 20px;
  }
</style>
</head>
<body class="app-fullscreen">

<header class="draw-header">
  <a href="/index.html" class="back-link">← もどる</a>
  <h1>🌍 おでかけ</h1>
  <button class="panel-toggle" id="sceneToggle">🌍</button>
  <button class="panel-toggle" id="avatarToggle">👧</button>
  <button class="btn-primary" id="saveBtn">💾 ほぞん</button>
</header>

<div class="draw-main">
  <div class="panel-backdrop" id="panelBackdrop"></div>

  <aside class="side-panel" id="scenePanel">
    <button class="panel-close" id="sceneClose">✕</button>
    <div class="picker-title">🌍 ばしょを えらんで</div>
    <div class="scene-list" id="sceneList"></div>
  </aside>

  <div class="canvas-area">
    <div class="canvas-container">
      <canvas id="sceneCanvas" width="720" height="500"></canvas>
    </div>
  </div>

  <aside class="side-panel right" id="avatarPanel">
    <button class="panel-close" id="avatarClose">✕</button>
    <div class="picker-title">👧 アバターを えらんで</div>
    <div class="avatar-list" id="avatarList">
      <div class="empty-hint" style="grid-column:1/-1;">まだ アバター が ないよ！<br>「おえかき」で つくってね 🎨</div>
    </div>
  </aside>
</div>

<div class="draw-dock">
  <div class="dock-slider">
    <label>おおきさ</label>
    <input type="range" id="scaleSlider" min="30" max="200" value="100">
    <span class="value" id="scaleValue">100</span>
  </div>
  <div class="dock-spacer"></div>
  <button class="dock-btn" id="centerBtn" title="ちゅうおうへ">🎯</button>
  <button class="dock-btn" id="clearAvatarBtn" title="アバターを けす">🗑️</button>
</div>

<div class="modal-backdrop" id="saveModal">
  <div class="modal-card">
    <h3>💾 このシーンを ほぞん する？</h3>
    <p style="color:var(--ink-soft);font-size:13px;font-weight:600;margin-bottom:16px;">
      あばたーめーかー の たな に 「おもいで」として のこるよ。
    </p>
    <button class="btn-primary" id="confirmSaveBtn" style="width:100%;margin-bottom:8px;">💾 ほぞん する</button>
    <button class="btn-ghost" id="closeSaveModal" style="width:100%;">とじる</button>
  </div>
</div>

<script type="module">
import { isConfigured, saveAvatar, watchAvatars } from '/shared/firebase.js';
import { showToast, loadImage, svgToImage, SCENE_LIBRARY } from '/shared/utils.js';

// ============================================================
// DOM
// ============================================================
const CANVAS_W = 720;
const CANVAS_H = 500;

const canvas = document.getElementById('sceneCanvas');
const ctx = canvas.getContext('2d');
const sceneList = document.getElementById('sceneList');
const avatarList = document.getElementById('avatarList');
const scaleSlider = document.getElementById('scaleSlider');
const scaleValue = document.getElementById('scaleValue');
const centerBtn = document.getElementById('centerBtn');
const clearAvatarBtn = document.getElementById('clearAvatarBtn');
const saveBtn = document.getElementById('saveBtn');
const saveModal = document.getElementById('saveModal');
const confirmSaveBtn = document.getElementById('confirmSaveBtn');
const closeSaveModal = document.getElementById('closeSaveModal');
const sceneToggle = document.getElementById('sceneToggle');
const avatarToggle = document.getElementById('avatarToggle');
const sceneClose = document.getElementById('sceneClose');
const avatarClose = document.getElementById('avatarClose');
const scenePanel = document.getElementById('scenePanel');
const avatarPanel = document.getElementById('avatarPanel');
const panelBackdrop = document.getElementById('panelBackdrop');

// ============================================================
// 状態
// ============================================================
const state = {
  scene: SCENE_LIBRARY[0],
  sceneImg: null,
  avatars: [],
  avatar: null,
  avatarImg: null,
  avatarX: CANVAS_W / 2,
  avatarY: SCENE_LIBRARY[0].groundY,
  avatarScale: 1
};

let dragState = null;

// ============================================================
// シーン一覧
// ============================================================
function buildSceneList() {
  sceneList.innerHTML = '';
  SCENE_LIBRARY.forEach(s => {
    const t = document.createElement('button');
    t.className = 'scene-thumb' + (s.key === state.scene.key ? ' selected' : '');
    const wrap = document.createElement('div');
    wrap.className = 'scene-svg-wrap';
    wrap.innerHTML = s.svg;
    t.appendChild(wrap);
    const lb = document.createElement('div');
    lb.className = 'scene-label';
    lb.textContent = s.label;
    t.appendChild(lb);
    t.addEventListener('click', () => selectScene(s));
    sceneList.appendChild(t);
  });
}

async function selectScene(s) {
  state.scene = s;
  state.sceneImg = await svgToImage(s.svg);
  // アバターY位置をシーンの地面に合わせる
  state.avatarY = s.groundY;
  buildSceneList();
  render();
  if (window.innerWidth <= 900) closeAllPanels();
}

// ============================================================
// アバター一覧
// ============================================================
function renderAvatarList() {
  avatarList.innerHTML = '';
  if (state.avatars.length === 0) {
    avatarList.innerHTML = '<div class="empty-hint" style="grid-column:1/-1;">まだ アバター が ないよ！<br>「おえかき」で つくってね 🎨</div>';
    return;
  }
  state.avatars.forEach(a => {
    const t = document.createElement('div');
    t.className = 'avatar-thumb' + (state.avatar && state.avatar.id === a.id ? ' selected' : '');
    const img = document.createElement('img');
    img.src = a.imageData;
    t.appendChild(img);
    t.addEventListener('click', () => selectAvatar(a));
    avatarList.appendChild(t);
  });
}

async function selectAvatar(a) {
  state.avatar = a;
  try {
    state.avatarImg = await loadImage(a.imageData);
  } catch (e) {
    console.error(e);
    showToast('アバターの よみこみ に しっぱい');
    return;
  }
  // アバターを地面の中央に配置
  state.avatarX = CANVAS_W / 2;
  state.avatarY = state.scene.groundY;
  state.avatarScale = 1;
  scaleSlider.value = 100;
  scaleValue.textContent = 100;
  renderAvatarList();
  render();
  if (window.innerWidth <= 900) closeAllPanels();
  showToast('アバターを えらんだよ！ドラッグで うごかせる よ');
}

// ============================================================
// 描画
// ============================================================
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  if (state.sceneImg) {
    ctx.drawImage(state.sceneImg, 0, 0, CANVAS_W, CANVAS_H);
  } else {
    ctx.fillStyle = '#DDEEFF';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#B8B2CC';
    ctx.font = '700 20px "Nunito", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('👈 ばしょを えらんでね', CANVAS_W / 2, CANVAS_H / 2);
  }
  if (state.avatarImg) {
    const img = state.avatarImg;
    // アバターの標準サイズを高さ180pxとして、それにscaleをかける
    const baseHeight = 200;
    const scale = (baseHeight / img.height) * state.avatarScale;
    const w = img.width * scale;
    const h = img.height * scale;
    ctx.drawImage(img, state.avatarX - w / 2, state.avatarY - h, w, h);
  }
}

// ============================================================
// アバター ドラッグ
// ============================================================
function getCoord(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
  const y = (e.clientY - rect.top) * (CANVAS_H / rect.height);
  return [x, y];
}
function isOnAvatar(x, y) {
  if (!state.avatarImg) return false;
  const img = state.avatarImg;
  const baseHeight = 200;
  const scale = (baseHeight / img.height) * state.avatarScale;
  const w = img.width * scale;
  const h = img.height * scale;
  return x >= state.avatarX - w/2 && x <= state.avatarX + w/2
      && y >= state.avatarY - h && y <= state.avatarY;
}
canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  canvas.setPointerCapture(e.pointerId);
  const [x, y] = getCoord(e);
  if (isOnAvatar(x, y)) {
    dragState = { startX: x, startY: y, origX: state.avatarX, origY: state.avatarY };
  }
});
canvas.addEventListener('pointermove', e => {
  if (!dragState) return;
  const [x, y] = getCoord(e);
  state.avatarX = Math.max(0, Math.min(CANVAS_W, dragState.origX + (x - dragState.startX)));
  state.avatarY = Math.max(80, Math.min(CANVAS_H, dragState.origY + (y - dragState.startY)));
  render();
});
canvas.addEventListener('pointerup', () => { dragState = null; });
canvas.addEventListener('pointercancel', () => { dragState = null; });

scaleSlider.addEventListener('input', e => {
  state.avatarScale = +e.target.value / 100;
  scaleValue.textContent = e.target.value;
  render();
});

centerBtn.addEventListener('click', () => {
  state.avatarX = CANVAS_W / 2;
  state.avatarY = state.scene.groundY;
  render();
});
clearAvatarBtn.addEventListener('click', () => {
  state.avatar = null;
  state.avatarImg = null;
  renderAvatarList();
  render();
});

// ============================================================
// パネル開閉
// ============================================================
function updatePanelState() {
  const anyOpen = scenePanel.classList.contains('open') || avatarPanel.classList.contains('open');
  panelBackdrop.classList.toggle('show', anyOpen);
  sceneToggle.classList.toggle('active', scenePanel.classList.contains('open'));
  avatarToggle.classList.toggle('active', avatarPanel.classList.contains('open'));
}
function closeAllPanels() {
  scenePanel.classList.remove('open');
  avatarPanel.classList.remove('open');
  updatePanelState();
}
sceneToggle.addEventListener('click', () => {
  scenePanel.classList.toggle('open');
  avatarPanel.classList.remove('open');
  updatePanelState();
});
avatarToggle.addEventListener('click', () => {
  avatarPanel.classList.toggle('open');
  scenePanel.classList.remove('open');
  updatePanelState();
});
sceneClose.addEventListener('click', closeAllPanels);
avatarClose.addEventListener('click', closeAllPanels);
panelBackdrop.addEventListener('click', closeAllPanels);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAllPanels(); });

// ============================================================
// 保存
// ============================================================
saveBtn.addEventListener('click', () => {
  if (!state.avatar) { showToast('アバターを えらんでね'); return; }
  if (!isConfigured) { showToast('Firebase の せってい が まだ です'); return; }
  saveModal.classList.add('show');
});
closeSaveModal.addEventListener('click', () => saveModal.classList.remove('show'));
saveModal.addEventListener('click', e => { if (e.target === saveModal) saveModal.classList.remove('show'); });

confirmSaveBtn.addEventListener('click', async () => {
  saveModal.classList.remove('show');
  const imageData = canvas.toDataURL('image/png');
  try {
    showToast('ほぞん ちゅう...');
    await saveAvatar({
      imageData,
      type: 'scene',
      extra: { sceneKey: state.scene.key, baseAvatarId: state.avatar.id }
    });
    showToast('🎉 「おもいで」に ほぞん したよ！');
  } catch (err) {
    console.error(err);
    showToast('ほぞん に しっぱい');
  }
});

// ============================================================
// Firestoreからアバター取得
// ============================================================
if (isConfigured) {
  watchAvatars(items => {
    state.avatars = items.filter(x => x.type === 'avatar' || x.type === 'madeup');
    renderAvatarList();
  });
} else {
  showToast('Firebase の せってい が まだ です', 3000);
}

// ============================================================
// 初期化
// ============================================================
buildSceneList();
(async () => {
  state.sceneImg = await svgToImage(state.scene.svg);
  render();
})();
</script>

</body>
</html>
