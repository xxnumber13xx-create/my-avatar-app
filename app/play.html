<!DOCTYPE html>
<html lang="ja" class="app-fullscreen">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>あそぶ｜あばたーめーかー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/styles.css">
<style>
  body.app-fullscreen {
    background:
      radial-gradient(circle at 20% 0%, #FFF3D6, transparent 35%),
      radial-gradient(circle at 90% 100%, #FFE1EE, transparent 40%),
      radial-gradient(circle at 10% 100%, #DDEEFF, transparent 40%),
      var(--bg);
  }

  .draw-header {
    flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
    border-bottom: 2px solid #EDE9FF;
    position: relative; z-index: 200;
  }
  .draw-header .back-link { padding: 6px 12px; font-size: 13px; }
  .draw-header h1 {
    flex: 1; margin: 0;
    font-family: 'Baloo 2', sans-serif;
    color: var(--pink-dark);
    font-size: clamp(16px, 3.5vw, 22px); letter-spacing: 0.3px;
  }

  /* ==== ステージ（大きく中央に あばたー） ==== */
  .play-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  .avatar-figure {
    max-width: min(60vw, 320px);
    max-height: min(50vh, 400px);
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 20px 25px rgba(46,42,71,0.15));
    transform-origin: 50% 90%;   /* 足元中心で回転・拡縮 */
    /* デフォルト: ふわふわ浮く（アイドル） */
    animation: idle-float 3s ease-in-out infinite;
  }
  .avatar-empty {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    color: var(--ink-soft);
    text-align: center;
    padding: 20px;
    line-height: 1.6;
  }

  /* ==== きらきら パーティクル ==== */
  .sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .spark {
    position: absolute;
    font-size: 20px;
    opacity: 0;
    animation: spark-drift 4s linear infinite;
    will-change: transform, opacity;
  }
  @keyframes spark-drift {
    0%   { transform: translate(0, 20px) scale(0.6); opacity: 0; }
    20%  { opacity: 0.9; }
    100% { transform: translate(var(--dx, 30px), -120px) scale(1.2); opacity: 0; }
  }

  /* ==== アバター選択 ==== */
  .avatar-picker {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border-top: 2px solid #EDE9FF;
    padding: 8px 12px;
    display: flex; gap: 8px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .avatar-picker::-webkit-scrollbar { height: 6px; }
  .avatar-picker::-webkit-scrollbar-thumb { background: #DCD5FF; border-radius: 3px; }
  .avatar-picker img {
    width: 56px; height: 56px;
    object-fit: contain;
    background: #fff;
    border-radius: 12px;
    border: 3px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    padding: 3px;
    transition: transform .12s ease;
  }
  .avatar-picker img.selected {
    border-color: var(--pink);
    box-shadow: 0 4px 0 rgba(255,107,157,0.35);
  }
  .avatar-picker img:hover { transform: translateY(-2px); }
  .avatar-picker .picker-hint {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    color: var(--ink-soft);
    font-size: 12px;
    padding: 20px 10px;
    white-space: nowrap;
  }

  /* ==== 動きボタン ==== */
  .draw-dock {
    flex: 0 0 auto;
    background: #fff;
    border-top: 2px solid #EDE9FF;
    padding: 10px 14px calc(10px + var(--sab));
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .action-btn {
    background: linear-gradient(180deg, #FFE1EE, #FFC5D9);
    border: 3px solid #fff;
    border-radius: 16px;
    padding: 12px 6px;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 13px;
    color: var(--pink-dark);
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(255,107,157,0.4);
    transition: transform .12s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    line-height: 1.1;
  }
  .action-btn .emoji { font-size: 22px; }
  .action-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(255,107,157,0.4);
  }
  .action-btn:disabled {
    opacity: 0.5; cursor: not-allowed;
    background: #F0F0F0;
    color: var(--ink-soft);
    box-shadow: 0 4px 0 #D0D0D0;
  }
  .action-btn.wave { background: linear-gradient(180deg, #FFF3C9, #FFDF7A); color: #A66700; box-shadow: 0 4px 0 rgba(240,180,20,0.4); }
  .action-btn.jump { background: linear-gradient(180deg, #DDEEFF, #B8DAFF); color: #2A5090; box-shadow: 0 4px 0 rgba(60,130,220,0.4); }
  .action-btn.dance { background: linear-gradient(180deg, #F1EEFF, #D8CBFF); color: var(--purple); box-shadow: 0 4px 0 rgba(124,111,242,0.4); }
  .action-btn.spin { background: linear-gradient(180deg, #DDF5EA, #A8E8CC); color: #1E7A55; box-shadow: 0 4px 0 rgba(40,170,120,0.4); }

  @media (max-width: 380px) {
    .action-btn { font-size: 11px; padding: 10px 4px; }
    .action-btn .emoji { font-size: 18px; }
  }

  /* ================================================
     ✨ 動きの アニメーション
     ================================================ */
  @keyframes idle-float {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-8px) scale(1.005); }
  }

  /* 👋 手をふる（体を左右に軽く傾ける） */
  .avatar-figure.wave {
    animation: wave-anim 0.6s ease-in-out 4 both;
  }
  @keyframes wave-anim {
    0%, 100% { transform: rotate(0); }
    25%      { transform: rotate(-10deg) translateY(-4px); }
    75%      { transform: rotate(10deg) translateY(-4px); }
  }

  /* 🦘 ジャンプ（つぶれる → 跳ねる → 着地でつぶれる） */
  .avatar-figure.jump {
    animation: jump-anim 0.9s cubic-bezier(0.5, 0, 0.5, 1) 2 both;
  }
  @keyframes jump-anim {
    0%   { transform: translateY(0) scaleY(1) scaleX(1); }
    15%  { transform: translateY(0) scaleY(0.8) scaleX(1.1); }
    45%  { transform: translateY(-100px) scaleY(1.05) scaleX(0.95); }
    75%  { transform: translateY(0) scaleY(0.8) scaleX(1.1); }
    100% { transform: translateY(0) scaleY(1) scaleX(1); }
  }

  /* 💃 おどる（傾き + 上下 + 左右揺れ の合成） */
  .avatar-figure.dance {
    animation: dance-anim 0.8s ease-in-out 4 both;
  }
  @keyframes dance-anim {
    0%   { transform: translate(0, 0) rotate(0); }
    25%  { transform: translate(-14px, -20px) rotate(-8deg); }
    50%  { transform: translate(0, -6px) rotate(0); }
    75%  { transform: translate(14px, -20px) rotate(8deg); }
    100% { transform: translate(0, 0) rotate(0); }
  }

  /* 🌀 まわる（1回転） */
  .avatar-figure.spin {
    animation: spin-anim 1.2s ease-in-out 2 both;
  }
  @keyframes spin-anim {
    0%   { transform: translateY(0) rotate(0) scale(1); }
    30%  { transform: translateY(-20px) rotate(180deg) scale(0.95); }
    70%  { transform: translateY(-20px) rotate(540deg) scale(0.95); }
    100% { transform: translateY(0) rotate(720deg) scale(1); }
  }
</style>
</head>
<body class="app-fullscreen">

<header class="draw-header">
  <a href="/index.html" class="back-link">← もどる</a>
  <h1>✨ あそぶ</h1>
</header>

<main class="play-stage">
  <div class="sparkles" id="sparkles"></div>
  <img class="avatar-figure" id="avatarFigure" alt="" style="display:none;">
  <div class="avatar-empty" id="avatarEmpty">
    したから あばたー を えらんでね 👇
  </div>
</main>

<div class="avatar-picker" id="avatarPicker">
  <span class="picker-hint" id="pickerHint">よみこみ ちゅう…</span>
</div>

<div class="draw-dock">
  <button class="action-btn wave" id="btnWave" disabled>
    <span class="emoji">👋</span><span>てをふる</span>
  </button>
  <button class="action-btn jump" id="btnJump" disabled>
    <span class="emoji">🦘</span><span>ジャンプ</span>
  </button>
  <button class="action-btn dance" id="btnDance" disabled>
    <span class="emoji">💃</span><span>おどる</span>
  </button>
  <button class="action-btn spin" id="btnSpin" disabled>
    <span class="emoji">🌀</span><span>まわる</span>
  </button>
</div>

<script type="module">
import { isConfigured, watchAvatars } from '/shared/firebase.js';
import { showToast } from '/shared/utils.js';

const avatarFigure = document.getElementById('avatarFigure');
const avatarEmpty  = document.getElementById('avatarEmpty');
const avatarPicker = document.getElementById('avatarPicker');
const pickerHint   = document.getElementById('pickerHint');
const sparkles     = document.getElementById('sparkles');

const btnWave  = document.getElementById('btnWave');
const btnJump  = document.getElementById('btnJump');
const btnDance = document.getElementById('btnDance');
const btnSpin  = document.getElementById('btnSpin');

let selectedId = null;
let currentAnimation = null; // 'wave' | 'jump' | 'dance' | 'spin'

// ============================================================
// ✨ きらきら パーティクル
// ============================================================
const SPARK_CHARS = ['✨', '💖', '⭐', '🌟', '💫'];
function spawnSpark() {
  const s = document.createElement('div');
  s.className = 'spark';
  s.textContent = SPARK_CHARS[Math.floor(Math.random() * SPARK_CHARS.length)];
  s.style.left = (10 + Math.random() * 80) + '%';
  s.style.top = (60 + Math.random() * 30) + '%';
  s.style.setProperty('--dx', (Math.random() * 60 - 30) + 'px');
  s.style.animationDuration = (2.5 + Math.random() * 2) + 's';
  s.style.animationDelay = Math.random() * 0.6 + 's';
  sparkles.appendChild(s);
  setTimeout(() => s.remove(), 5000);
}
setInterval(spawnSpark, 500);

// ============================================================
// 動きを実行
// ============================================================
function playAnimation(name) {
  if (!avatarFigure.src || avatarFigure.style.display === 'none') {
    showToast('さきに あばたー を えらんでね！');
    return;
  }
  // 既存のアニメーションクラスを消す
  ['wave', 'jump', 'dance', 'spin'].forEach(c => avatarFigure.classList.remove(c));
  // 一瞬 reflow を強制して animation を再スタート可能に
  void avatarFigure.offsetWidth;
  currentAnimation = name;
  avatarFigure.classList.add(name);
}

// アニメーション終了時に クラスを外して idle-float に戻す
avatarFigure.addEventListener('animationend', (e) => {
  if (e.animationName === 'idle-float') return; // 常時ふわふわは無視
  avatarFigure.classList.remove('wave', 'jump', 'dance', 'spin');
  currentAnimation = null;
});

btnWave.addEventListener('click',  () => playAnimation('wave'));
btnJump.addEventListener('click',  () => playAnimation('jump'));
btnDance.addEventListener('click', () => playAnimation('dance'));
btnSpin.addEventListener('click',  () => playAnimation('spin'));

// ============================================================
// あばたー選択
// ============================================================
function renderPicker(avatars) {
  avatarPicker.innerHTML = '';
  if (avatars.length === 0) {
    const hint = document.createElement('span');
    hint.className = 'picker-hint';
    hint.textContent = 'まだ あばたー が いないよ！「おえかき」で つくってね 🎨';
    avatarPicker.appendChild(hint);
    return;
  }
  avatars.forEach(av => {
    const img = document.createElement('img');
    img.src = av.realisticImageData || av.imageData;
    img.title = 'このあばたーで あそぶ';
    if (selectedId === av.id) img.classList.add('selected');
    img.addEventListener('click', () => selectAvatar(av));
    avatarPicker.appendChild(img);
  });
  // まだ何も選ばれていなければ 最初のを自動で選ぶ
  if (!selectedId) selectAvatar(avatars[0]);
}

function selectAvatar(av) {
  selectedId = av.id;
  avatarFigure.src = av.realisticImageData || av.imageData;
  avatarFigure.style.display = 'block';
  avatarEmpty.style.display = 'none';
  [btnWave, btnJump, btnDance, btnSpin].forEach(b => b.disabled = false);
  // 選択枠の更新
  avatarPicker.querySelectorAll('img').forEach(el => {
    el.classList.toggle('selected', el.src === (av.realisticImageData || av.imageData));
  });
}

// ============================================================
// Firestore 監視
// ============================================================
if (isConfigured) {
  watchAvatars(all => {
    // avatar / look / madeup を全部対象に
    const list = all.filter(x => x.type === 'avatar' || x.type === 'look' || x.type === 'madeup');
    renderPicker(list);
  });
} else {
  pickerHint.textContent = 'Firebase の せってい が まだ です';
  showToast('Firebase の せってい が まだ です', 3000);
}
</script>

</body>
</html>
